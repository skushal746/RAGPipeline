# ─────────────────────────────────────────────────────────────────────────────
# Enterprise RAG Pipeline — Local Development Stack
#
# Services
#   kafka             — KRaft-mode (no Zookeeper) message broker
#                       INTERNAL://kafka:29092  ← used by containers
#                       EXTERNAL://localhost:9092 ← used by host machine
#   kafka-ui          — Kafbat UI dashboard  → http://localhost:8090
#   localstack        — AWS S3 emulation; bucket auto-created via init script
#   postgres          — User auth database   → localhost:5432
#   ingestion-service — Spring Boot ingestion layer (Phase 1)
#   ml-worker         — Python ML consumer (Phase 2, placeholder)
#   etcd              — Milvus metadata store (internal)
#   milvus-minio      — Milvus object storage / MinIO (internal)
#   milvus-standalone — Vector database → localhost:19530 (gRPC), :9091 (HTTP)
#   attu              — Milvus GUI       → http://localhost:8001
#   frontend          — React SPA        → http://localhost:3000
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Kafka (KRaft — no Zookeeper) ──────────────────────────────────────────
  kafka:
    image: apache/kafka:latest
    container_name: rag-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Dual-listener: INTERNAL for containers, EXTERNAL for host
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      # Single-broker: internal system topics must also use RF=1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list 2>/dev/null || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - kafka-data:/bitnami/kafka

  # ── Kafbat UI ──────────────────────────────────────────────────────────────
  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: rag-kafka-ui
    ports:
      - "8090:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: rag-pipeline-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    restart: on-failure

  # ── LocalStack (S3 emulation) ──────────────────────────────────────────────
  localstack:
    image: localstack/localstack:3.4
    container_name: rag-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    volumes:
      - ./init-localstack.sh:/etc/localstack/init/ready.d/01-init.sh
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: [ "CMD-SHELL", "awslocal s3 ls 2>/dev/null || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: rag-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpass
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U raguser -d ragdb" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Ingestion Service (Spring Boot — Maven live reload) ───────────────────
  ingestion-service:
    image: maven:3.9.6-eclipse-temurin-17
    container_name: rag-ingestion-service
    working_dir: /app
    volumes:
      - ./ingestion-service:/app
      - ingestion-service-m2:/root/.m2
    command: mvn spring-boot:run
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
      localstack:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

      SPRING_CLOUD_AWS_S3_ENDPOINT: http://localstack:4566
      SPRING_CLOUD_AWS_S3_PATH_STYLE_ACCESS_ENABLED: "true"
      SPRING_CLOUD_AWS_REGION_STATIC: us-east-1

      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1

      S3_BUCKET_NAME: rag-pipeline-documents

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ragdb
      SPRING_DATASOURCE_USERNAME: raguser
      SPRING_DATASOURCE_PASSWORD: ragpass

      JWT_SECRET: ${JWT_SECRET:-rag-pipeline-secret-key-change-in-production-32chars}
      JWT_EXPIRY_MS: "86400000"

      # Phase 3 — RAG query layer
      MILVUS_HOST: milvus-standalone
      MILVUS_PORT: "19530"
      ML_WORKER_BASE_URL: http://ml-worker:8000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"' || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 180s
    restart: on-failure

  # ── ML Worker (Python — Phase 2: Kafka consumer + embeddings + Milvus) ──────
  ml-worker:
    build:
      context: ./ml-worker
      dockerfile: Dockerfile
    container_name: rag-ml-worker
    ports:
      - "8000:8000"
    depends_on:
      kafka:
        condition: service_healthy
      localstack:
        condition: service_healthy
      milvus-standalone:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AWS_S3_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      S3_BUCKET_NAME: rag-pipeline-documents
      MILVUS_HOST: milvus-standalone
      MILVUS_PORT: "19530"
    restart: on-failure

  # ── Milvus: etcd (distributed metadata store) ────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.14
    container_name: milvus-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd-data:/etcd
    command: >
      etcd --advertise-client-urls=http://127.0.0.1:2379 --listen-client-urls=http://0.0.0.0:2379 --data-dir=/etcd
    healthcheck:
      test: [ "CMD", "etcdctl", "endpoint", "health" ]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 20s

  # ── Milvus: MinIO (index/segment object storage — separate from LocalStack) ─
  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: milvus-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9000:9000" # S3-compatible API
      - "9001:9001" # MinIO Console UI
    volumes:
      - minio-data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 20s

  # ── Milvus Standalone ──────────────────────────────────────────────────────
  milvus-standalone:
    image: milvusdb/milvus:v2.4.15
    container_name: milvus-standalone
    command: [ "milvus", "run", "standalone" ]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    ports:
      - "19530:19530" # gRPC — SDK connections (Python, Java)
      - "9091:9091" # HTTP REST + Prometheus metrics
    volumes:
      - milvus-data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9091/healthz" ]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 90s

  # ── Attu — Milvus GUI ──────────────────────────────────────────────────────
  attu:
    image: zilliz/attu:v2.4
    container_name: milvus-attu
    environment:
      MILVUS_URL: milvus-standalone:19530
    ports:
      - "8001:3000"
    depends_on:
      milvus-standalone:
        condition: service_healthy
    restart: on-failure

  # ── Frontend (React — Vite dev server) ────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: rag-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    ports:
      - "3000:5173"
    environment:
      API_TARGET: http://ingestion-service:8080
    command: sh -c "npm install && npm run dev"
    depends_on:
      ingestion-service:
        condition: service_healthy
    restart: on-failure

volumes:
  kafka-data:
  localstack-data:
  etcd-data:
  minio-data:
  milvus-data:
  postgres-data:
  frontend-node-modules:
  ingestion-service-m2:
