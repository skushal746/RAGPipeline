version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Enterprise RAG Pipeline — Local Development Stack
#
# Services
#   kafka             — KRaft-mode (no Zookeeper) message broker
#                       INTERNAL://kafka:29092  ← used by containers
#                       EXTERNAL://localhost:9092 ← used by host machine
#   kafka-ui          — Kafbat UI dashboard  → http://localhost:8090
#   localstack        — AWS S3 emulation; bucket auto-created via init script
#   ingestion-service — Spring Boot ingestion layer (Phase 1)
#   ml-worker         — Python ML consumer (Phase 2, placeholder)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Kafka (KRaft — no Zookeeper) ──────────────────────────────────────────
  kafka:
    image: bitnami/kafka:3.7
    container_name: rag-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Dual-listener: INTERNAL for containers, EXTERNAL for host
      KAFKA_CFG_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: 3
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - kafka-data:/bitnami/kafka

  # ── Kafbat UI ──────────────────────────────────────────────────────────────
  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: rag-kafka-ui
    ports:
      - "8090:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: rag-pipeline-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    restart: on-failure

  # ── LocalStack (S3 emulation) ──────────────────────────────────────────────
  localstack:
    image: localstack/localstack:3.4
    container_name: rag-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    volumes:
      - ./init-localstack.sh:/etc/localstack/init/ready.d/01-init.sh
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "awslocal s3 ls 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Ingestion Service (Spring Boot) ───────────────────────────────────────
  ingestion-service:
    build:
      context: ./ingestion-service
      dockerfile: Dockerfile
    container_name: rag-ingestion-service
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
      localstack:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

      SPRING_CLOUD_AWS_S3_ENDPOINT: http://localstack:4566
      SPRING_CLOUD_AWS_S3_PATH_STYLE_ACCESS_ENABLED: "true"
      SPRING_CLOUD_AWS_REGION_STATIC: us-east-1

      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1

      S3_BUCKET_NAME: rag-pipeline-documents
    restart: on-failure

  # ── ML Worker (Python — Phase 2 placeholder) ──────────────────────────────
  ml-worker:
    build:
      context: ./ml-worker
      dockerfile: Dockerfile
    container_name: rag-ml-worker
    depends_on:
      kafka:
        condition: service_healthy
      localstack:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AWS_S3_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      S3_BUCKET_NAME: rag-pipeline-documents
    restart: on-failure

volumes:
  kafka-data:
  localstack-data:
